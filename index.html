*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"PingFang SC","Noto Sans CJK SC",sans-serif;background:#f5f6fa;color:#1a1d26;line-height:1.6;padding:20px;}
.wrap{max-width:1000px;margin:0 auto;}
h1{font-size:22px;margin-bottom:4px;}
h1 small{font-size:13px;font-weight:400;color:#7a7f8a;}
.date{font-size:13px;color:#7a7f8a;margin-bottom:20px;}
.card{background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card h2{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e6ed;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;text-align:center;border-bottom:1px solid #eef0f5;}
th{background:#f8f9fc;font-weight:600;font-size:11px;color:#5f636d;white-space:nowrap;}
tr:hover td{background:#f8f9fc;}
tr.highlight td{background:#fffde7;font-weight:600;}
.g{color:#1d9e75;}.r{color:#e24b4a;}
.badge{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600;}
.badge.up{background:#e6f7ef;color:#1d9e75;}
.badge.down{background:#fde8e8;color:#e24b4a;}
.chart-container{position:relative;height:320px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-box{text-align:center;padding:12px 8px;background:#f8f9fc;border-radius:8px;}
.stat-box .val{font-size:20px;font-weight:700;}
.stat-box .lab{font-size:11px;color:#7a7f8a;margin-top:2px;}
@media(max-width:600px){
  body{padding:12px;}
  .card{padding:14px 16px;}
  th,td{padding:5px 6px;font-size:12px;}
  .chart-container{height:240px;}
}

];

function calcWeights(day) {
  const d = {}; let s = 0;
  for (const n of labels) {
    d[n] = n==='ETF' ? day.etfDistance : (FAIR_PB[n]/day.pb[n]-1)*100;
    if (d[n]>0) s += d[n];
  }
  let w = {}; for (const n of labels) w[n] = d[n]>0 ? d[n]/s : 0;
  if (w['中远海控'] > 0.40) {
    w['中远海控'] = 0.40;
    let od={},os=0;
    for(const n of labels) {if(n!=='中远海控'&&d[n]>0){od[n]=d[n];os+=d[n];}}
    for(const n of labels) {if(n!=='中远海控'&&d[n]>0) w[n]=(od[n]/os)*0.60;}
  }
  for(const n of labels) if(w[n]<0) w[n]=0;
  let t=Object.values(w).reduce((a,b)=>a+b,0);
  if(t>0) for(const n of labels) w[n]/=t;
  return {d,w};
}

function fmtP(v) {return (v*100).toFixed(2)+'%';}

function render() {
  const l=historyData[historyData.length-1];
  const r=calcWeights(l);
  
  let td=0,uc=0,mn='',mw=0;
  for(const n of labels){if(r.d[n]>0){td+=r.d[n];uc++;}if(r.w[n]>mw){mw=r.w[n];mn=n;}}
  document.getElementById('totalDist').textContent=td.toFixed(1)+'%';
  document.getElementById('highestWeight').textContent=mn+' '+fmtP(mw);
  document.getElementById('underweightCount').textContent=uc+'/'+labels.length;
  document.getElementById('navToday').textContent=l.nav.toFixed(2);

  const tb=document.getElementById('weightTable');tb.innerHTML='';
  for(const n of labels){
    const tr=document.createElement('tr');
    if(n===mn) tr.className='highlight';
    const fair=n==='ETF'?'--':FAIR_PB[n].toFixed(2);
    const cur=n==='ETF'?'--':l.pb[n].toFixed(2);
    const st=r.d[n]>0?'<span class="badge up">低估 +'+r.d[n].toFixed(1)+'%</span>':(r.d[n]<0?'<span class="badge down">高估 '+r.d[n].toFixed(1)+'%</span>':'<span class="badge">合理</span>');
    tr.innerHTML='<td style="font-weight:600;text-align:left;">'+n+'</td><td>'+fair+'</td><td>'+cur+'</td><td class="'+(r.d[n]>0?'g':'r')+'">'+(r.d[n]>0?'+':'')+r.d[n].toFixed(2)+'%</td><td style="font-weight:600;">'+fmtP(r.w[n])+'</td><td>'+st+'</td>';
    tb.appendChild(tr);
  }

  const ht=document.getElementById('historyTable');ht.innerHTML='';
  for(let i=historyData.length-1;i>=0;i--){
    const d=historyData[i],c=calcWeights(d);
    const tr=document.createElement('tr');
    tr.innerHTML='<td style="font-weight:600;">'+d.date+'</td>'
      +'<td>'+fmtP(c.w['中远海控'])+'</td><td>'+fmtP(c.w['新和成'])+'</td>'
      +'<td>'+fmtP(c.w['中国海油'])+'</td><td>'+fmtP(c.w['国信证券'])+'</td>'
      +'<td>'+fmtP(c.w['华新建材'])+'</td><td>'+fmtP(c.w['ETF'])+'</td>'
      +'<td>'+d.nav.toFixed(2)+'</td>';
    ht.appendChild(tr);
  }

  const ctx=document.getElementById('navChart').getContext('2d');
  if(window._navChart) window._navChart.destroy();
  window._navChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:historyData.map(d=>d.date),
      datasets:[{
        label:'组合净值',
        data:historyData.map(d=>d.nav),
        borderColor:'#1d9e75',
        backgroundColor:'rgba(29,158,117,0.08)',
        fill:true,
        tension:0.3,
        pointRadius:2,
        pointBackgroundColor:'#1d9e75',
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>'净值: '+ctx.parsed.y.toFixed(2)}}},
      scales:{
        y:{beginAtZero:true,ticks:{callback:v=>v.toFixed(2)}},
        x:{ticks:{maxTicksLimit:10}}
      }
    }
  });
}
render();
