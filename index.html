.badge.down{background:#fde8e8;color:#e24b4a;}
.chart-container{position:relative;height:320px;margin-bottom:10px;}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:800px){.chart-grid{grid-template-columns:1fr;}}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px;}
.stat-box{text-align:center;padding:12px 8px;background:#f8f9fc;border-radius:8px;}
.stat-box .val{font-size:20px;font-weight:700;}
.stat-box .lab{font-size:11px;color:#7a7f8a;margin-top:2px;}
.corr-info{font-size:12px;color:#7a7f8a;margin-top:6px;text-align:center;}
.data-source{font-size:11px;color:#999;text-align:right;margin-top:4px;}
.nav-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.nav-tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #dde0e6;background:#fff;color:#5f636d;}
.nav-tab.active{background:#1d9e75;color:#fff;border-color:#1d9e75;}
@media(max-width:600px){
  body{padding:12px;}
  .card{padding:14px 16px;}
  th,td{padding:5px 6px;font-size:12px;}
  .chart-container{height:240px;}

  { stock: '华新建材', indicator: 'cement', stockLabel: '华新建材(元)', indLabel: '水泥价格指数', indUnit: '点', info: '华新建材股价 vs 水泥价格指数走势对比 | 水泥指数来源: CEMPI(ccement.com)' }
];

let activeCorrTab = 0;
let corrChart = null;

function switchCorrTab(idx) {
  activeCorrTab = idx;
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.className = 'nav-tab' + (i === idx ? ' active' : '');
  });
  renderCorrChart();
}

function renderCorrChart() {
  const cfg = corrConfigs[activeCorrTab];
  const stockData = stockPrices[cfg.stock];
  const indData = corrData[cfg.indicator];
  
  // Normalize both to 100 for comparison
  const stockBase = stockData[0];
  const indBase = indData[0];
  const stockNorm = stockData.map(v => (v / stockBase) * 100);
  const indNorm = indData.map(v => (v / indBase) * 100);
  
  document.getElementById('corrInfo').textContent = cfg.info;

  const ctx = document.getElementById('corrChart').getContext('2d');
  if (corrChart) corrChart.destroy();
  
  corrChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates.slice(0, stockData.length),
      datasets: [
        {
          label: cfg.stockLabel + ' (归一化)',
          data: stockNorm,
          borderColor: '#1d9e75',
          backgroundColor: 'rgba(29,158,117,0.05)',
          borderWidth: 2,
          pointRadius: 1.5,
          pointBackgroundColor: '#1d9e75',
          fill: false,
          yAxisID: 'y'
        },
        {
          label: cfg.indLabel + ' (' + cfg.indUnit + ', 归一化)',
          data: indNorm,
          borderColor: '#e24b4a',
          backgroundColor: 'rgba(226,75,74,0.05)',
          borderWidth: 2,
          pointRadius: 1.5,
          pointBackgroundColor: '#e24b4a',
          borderDash: [4, 3],
          fill: false,
          yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14, padding: 12 } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const realVal = ctx.datasetIndex === 0 
                ? stockData[ctx.dataIndex].toFixed(2)
                : indData[ctx.dataIndex].toFixed(1);
              return ctx.dataset.label.replace(' (归一化)', '') + ': ' + realVal;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          ticks: { callback: v => v.toFixed(0) },
          title: { display: true, text: '归一化值 (基准=100)', font: { size: 10 } }
        },
        x: { ticks: { maxTicksLimit: 8, font: { size: 9 } } }
      }
    }
  });
}

function calcWeights(day) {
  const d = {}; let s = 0;
  for (const n of labels) {
    d[n] = n === 'ETF' ? day.etfDistance : (FAIR_PB[n] / day.pb[n] - 1) * 100;
    if (d[n] > 0) s += d[n];
  }
  let w = {}; for (const n of labels) w[n] = d[n] > 0 ? d[n] / s : 0;
  if (w['中远海控'] > 0.40) {
    w['中远海控'] = 0.40;
    let od = {}, os = 0;
    for (const n of labels) { if (n !== '中远海控' && d[n] > 0) { od[n] = d[n]; os += d[n]; } }
    for (const n of labels) { if (n !== '中远海控' && d[n] > 0) w[n] = (od[n] / os) * 0.60; else if (n !== '中远海控') w[n] = 0; }
  }
  for (const n of labels) if (w[n] < 0) w[n] = 0;
  let t = Object.values(w).reduce((a, b) => a + b, 0);
  if (t > 0) for (const n of labels) w[n] /= t;
  return { d, w };
}

function fmtP(v) { return (v * 100).toFixed(2) + '%'; }

function render() {
  const l = historyData[historyData.length - 1];
  const r = calcWeights(l);

  let td = 0, uc = 0, mn = '', mw = 0;
  for (const n of labels) { if (r.d[n] > 0) { td += r.d[n]; uc++; } if (r.w[n] > mw) { mw = r.w[n]; mn = n; } }
  document.getElementById('totalDist').textContent = td.toFixed(1) + '%';
  document.getElementById('highestWeight').textContent = mn + ' ' + fmtP(mw);
  document.getElementById('underweightCount').textContent = uc + '/' + labels.length;
  document.getElementById('navToday').textContent = l.nav.toFixed(2);

  const tb = document.getElementById('weightTable'); tb.innerHTML = '';
  for (const n of labels) {
    const tr = document.createElement('tr');
    if (n === mn) tr.className = 'highlight';
    const fair = n === 'ETF' ? '--' : FAIR_PB[n].toFixed(2);
    const cur = n === 'ETF' ? '--' : l.pb[n].toFixed(2);
    const st = r.d[n] > 0 ? '<span class="badge up">低估 +' + r.d[n].toFixed(1) + '%</span>' : (r.d[n] < 0 ? '<span class="badge down">高估 ' + r.d[n].toFixed(1) + '%</span>' : '<span class="badge">合理</span>');
    tr.innerHTML = '<td style="font-weight:600;text-align:left;">' + n + '</td><td>' + fair + '</td><td>' + cur + '</td><td class="' + (r.d[n] > 0 ? 'g' : 'r') + '">' + (r.d[n] > 0 ? '+' : '') + r.d[n].toFixed(2) + '%</td><td style="font-weight:600;">' + fmtP(r.w[n]) + '</td><td>' + st + '</td>';
    tb.appendChild(tr);
  }

  const ht = document.getElementById('historyTable'); ht.innerHTML = '';
  for (let i = historyData.length - 1; i >= 0; i--) {
    const d = historyData[i], c = calcWeights(d);
    const tr = document.createElement('tr');
    tr.innerHTML = '<td style="font-weight:600;">' + d.date + '</td>'
      + '<td>' + fmtP(c.w['中远海控']) + '</td><td>' + fmtP(c.w['新和成']) + '</td>'
      + '<td>' + fmtP(c.w['中国海油']) + '</td><td>' + fmtP(c.w['国信证券']) + '</td>'
      + '<td>' + fmtP(c.w['华新建材']) + '</td><td>' + fmtP(c.w['ETF']) + '</td>'
      + '<td>' + d.nav.toFixed(2) + '</td>';
    ht.appendChild(tr);
  }

  const ctx = document.getElementById('navChart').getContext('2d');
  if (window._navChart) window._navChart.destroy();
  window._navChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: historyData.map(d => d.date),
      datasets: [{
        label: '组合净值',
        data: historyData.map(d => d.nav),
        borderColor: '#1d9e75',
        backgroundColor: 'rgba(29,158,117,0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 2,
        pointBackgroundColor: '#1d9e75',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '净值: ' + ctx.parsed.y.toFixed(2) } }
      },
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v.toFixed(2) } },
        x: { ticks: { maxTicksLimit: 10 } }
      }
    }
  });

  // Render correlation chart
  renderCorrChart();
}

render();
</script>
</body>
</html>
